<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nithindev N</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Nithindev N</h1>
      <nav>
        <a href="#/" class="nav-link">Home</a>
        <a href="#/blog" class="nav-link">Blog</a>
        <a href="#/projects" class="nav-link">Projects</a>
      </nav>
    </header>

    <main id="content">
      <!-- Content will be dynamically loaded here -->
    </main>

    <footer>
      <p>© 2026 Nithindev N</p>
    </footer>
  </div>

  <script>
    // Page content
    const pages = {
      home: `
        <section class="intro">
          <p>
            Software developer who enjoys building things that work.
            I write code, solve problems, and learn new things every day.
          </p>
        </section>
      `,
      blog: `
        <h2>Blog</h2>

        <article>
          <time>Feb 20, 2026</time>
          <h3><a href="#/blog/lorem-ipsum">Lorem Ipsum Dolor Sit Amet</a></h3>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
        </article>

        <article>
          <time>Feb 15, 2026</time>
          <h3><a href="#/blog/consectetur">Consectetur Adipiscing Elit Vivamus</a></h3>
          <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
        </article>

        <article>
          <time>Feb 10, 2026</time>
          <h3><a href="#/blog/duis-aute">Duis Aute Irure Dolor Reprehenderit</a></h3>
          <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.</p>
        </article>
      `,
      projects: `
        <h2>Projects</h2>

        <article class="project">
          <h3>Lorem Ipsum Dolor Sit</h3>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</p>
          <div class="project-links">
            <a href="#">View Code</a>
            <a href="#">Live Demo</a>
          </div>
        </article>

        <article class="project">
          <h3>Consectetur Adipiscing Elit</h3>
          <p>Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.</p>
          <div class="project-links">
            <a href="#">View Code</a>
            <a href="#">Documentation</a>
          </div>
        </article>

        <article class="project">
          <h3>Duis Aute Irure Dolor</h3>
          <p>Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.</p>
          <div class="project-links">
            <a href="#">View Code</a>
            <a href="#">Try it Out</a>
          </div>
        </article>

        <article class="project">
          <h3>Excepteur Sint Occaecat</h3>
          <p>Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.</p>
          <div class="project-links">
            <a href="#">View Code</a>
            <a href="#">Learn More</a>
          </div>
        </article>
      `
    };

    // Router function
    function router() {
      const hash = window.location.hash.slice(1) || '/';
      const path = hash === '/' ? 'home' : hash.slice(1);

      // Load content
      const content = document.getElementById('content');
      content.innerHTML = pages[path] || pages.home;

      // Update active nav link
      document.querySelectorAll('.nav-link').forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === '#' + hash ||
            (hash === '' && link.getAttribute('href') === '#/')) {
          link.classList.add('active');
        }
      });

      // Scroll to top
      window.scrollTo(0, 0);
    }

    // Listen for hash changes
    window.addEventListener('hashchange', router);
    window.addEventListener('load', router);
  </script>
</body>
</html>
